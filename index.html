<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formation IA - Message d'accueil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --retro-teal: #127676;
            --retro-orange: #E4632E;
            --retro-jaune: #E3A535;
            --retro-ink: #0D1617;
            --retro-paper: #F2EFE6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--retro-ink) url('background.jpg') center center / cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .page-frame {
            background: var(--retro-paper);
            border: 4px solid var(--retro-orange);
            border-radius: 24px 8px 24px 8px;
            position: relative;
            width: 100%;
            max-width: 750px;
            padding: 40px 35px;
            min-height: calc(100vh - 100px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Motifs floraux aux coins */
        .corner-flourish {
            position: absolute;
            width: 50px;
            height: 50px;
            color: var(--retro-teal);
            opacity: 0.5;
        }
        .corner-flourish.top-left { top: 12px; left: 12px; }
        .corner-flourish.top-right { top: 12px; right: 12px; transform: scaleX(-1); }
        .corner-flourish.bottom-left { bottom: 12px; left: 12px; transform: scaleY(-1); }
        .corner-flourish.bottom-right { bottom: 12px; right: 12px; transform: scale(-1); }

        .corner-flourish svg {
            width: 100%;
            height: 100%;
        }

        .title {
            font-family: 'Anton', Impact, sans-serif;
            font-size: clamp(1.4rem, 4vw, 2rem);
            color: var(--retro-teal);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.2;
        }

        /* Séparateur Art Nouveau */
        .retro-separator {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 80%;
            max-width: 400px;
            margin-bottom: 30px;
            color: var(--retro-teal);
        }

        .retro-separator::before,
        .retro-separator::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent,
                var(--retro-teal) 20%,
                var(--retro-teal) 80%,
                transparent
            );
        }

        .retro-separator .flourish {
            font-size: 1.3rem;
            opacity: 0.7;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 720px;
            aspect-ratio: 16 / 9;
            border: 3px solid var(--retro-teal);
            border-radius: 16px 4px 16px 4px;
            box-shadow: inset 0 0 0 2px var(--retro-orange);
            overflow: hidden;
            background: var(--retro-ink);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .page-frame {
                padding: 40px 20px;
            }

            .title {
                font-size: 1.3rem;
            }

            .corner-flourish {
                width: 35px;
                height: 35px;
            }

        }
    </style>
</head>
<body>
    <div class="page-frame">
        <!-- Motifs floraux aux coins -->
        <div class="corner-flourish top-left">
            <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 45 Q5 25 25 25 Q25 5 45 5" stroke="currentColor" stroke-width="2" fill="none"/>
                <circle cx="25" cy="25" r="3" fill="currentColor"/>
                <path d="M15 35 Q15 25 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
                <path d="M35 15 Q25 15 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
            </svg>
        </div>
        <div class="corner-flourish top-right">
            <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 45 Q5 25 25 25 Q25 5 45 5" stroke="currentColor" stroke-width="2" fill="none"/>
                <circle cx="25" cy="25" r="3" fill="currentColor"/>
                <path d="M15 35 Q15 25 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
                <path d="M35 15 Q25 15 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
            </svg>
        </div>
        <div class="corner-flourish bottom-left">
            <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 45 Q5 25 25 25 Q25 5 45 5" stroke="currentColor" stroke-width="2" fill="none"/>
                <circle cx="25" cy="25" r="3" fill="currentColor"/>
                <path d="M15 35 Q15 25 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
                <path d="M35 15 Q25 15 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
            </svg>
        </div>
        <div class="corner-flourish bottom-right">
            <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 45 Q5 25 25 25 Q25 5 45 5" stroke="currentColor" stroke-width="2" fill="none"/>
                <circle cx="25" cy="25" r="3" fill="currentColor"/>
                <path d="M15 35 Q15 25 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
                <path d="M35 15 Q25 15 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
            </svg>
        </div>

        <h1 class="title">Ma présentation</h1>

        <div class="retro-separator">
            <span class="flourish">❧</span>
        </div>

        <div class="video-container">
            <div id="player"></div>
        </div>

    </div>

    <!-- YouTube IFrame API -->
    <script>
        // Charger l'API YouTube
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'FJcagGID6ho',
                playerVars: {
                    'rel': 0,
                    'modestbranding': 1,
                    'playsinline': 1
                }
            });
        }

        // Fallback si l'API YouTube ne charge pas
        setTimeout(function() {
            if (!player) {
                document.getElementById('player').innerHTML =
                    '<iframe src="https://www.youtube.com/embed/FJcagGID6ho?rel=0&modestbranding=1" ' +
                    'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" ' +
                    'allowfullscreen style="width:100%;height:100%;border:none;"></iframe>';
            }
        }, 3000);
    </script>
</body>
</html>
