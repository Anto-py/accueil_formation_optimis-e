<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formation IA - Message d'accueil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --retro-teal: #127676;
            --retro-orange: #E4632E;
            --retro-jaune: #E3A535;
            --retro-ink: #0D1617;
            --retro-paper: #F2EFE6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--retro-ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .page-frame {
            background: var(--retro-paper);
            border: 4px solid var(--retro-orange);
            border-radius: 24px 8px 24px 8px;
            position: relative;
            width: 100%;
            max-width: 900px;
            padding: 50px 40px;
            min-height: calc(100vh - 24px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Motifs floraux aux coins */
        .corner-flourish {
            position: absolute;
            width: 50px;
            height: 50px;
            color: var(--retro-teal);
            opacity: 0.5;
        }
        .corner-flourish.top-left { top: 12px; left: 12px; }
        .corner-flourish.top-right { top: 12px; right: 12px; transform: scaleX(-1); }
        .corner-flourish.bottom-left { bottom: 12px; left: 12px; transform: scaleY(-1); }
        .corner-flourish.bottom-right { bottom: 12px; right: 12px; transform: scale(-1); }

        .corner-flourish svg {
            width: 100%;
            height: 100%;
        }

        .title {
            font-family: 'Anton', Impact, sans-serif;
            font-size: clamp(1.4rem, 4vw, 2rem);
            color: var(--retro-teal);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.2;
        }

        /* Séparateur Art Nouveau */
        .retro-separator {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 80%;
            max-width: 400px;
            margin-bottom: 30px;
            color: var(--retro-teal);
        }

        .retro-separator::before,
        .retro-separator::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent,
                var(--retro-teal) 20%,
                var(--retro-teal) 80%,
                transparent
            );
        }

        .retro-separator .flourish {
            font-size: 1.3rem;
            opacity: 0.7;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 720px;
            aspect-ratio: 16 / 9;
            border: 3px solid var(--retro-teal);
            border-radius: 16px 4px 16px 4px;
            box-shadow: inset 0 0 0 2px var(--retro-orange);
            overflow: hidden;
            background: var(--retro-ink);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .button-container {
            margin-top: 40px;
        }

        .retro-btn-pill {
            display: inline-flex;
            align-items: stretch;
            border-radius: 50px;
            border: 3px solid var(--retro-teal);
            overflow: hidden;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(13, 22, 23, 0.15);
        }

        .retro-btn-pill:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(13, 22, 23, 0.25);
        }

        .retro-btn-pill-text {
            background: var(--retro-jaune);
            color: var(--retro-ink);
            padding: 0.9rem 1.8rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
        }

        .retro-btn-pill-icon {
            background: var(--retro-orange);
            color: var(--retro-paper);
            width: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        /* État initial du bouton (discret) */
        .retro-btn-pill.subtle {
            opacity: 0.6;
            transform: scale(0.95);
        }

        .retro-btn-pill.subtle:hover {
            opacity: 0.8;
            transform: scale(0.97);
        }

        /* Animation pour mise en évidence */
        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(227, 165, 53, 0.7),
                            0 4px 12px rgba(13, 22, 23, 0.15);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(227, 165, 53, 0),
                            0 6px 20px rgba(13, 22, 23, 0.25);
            }
        }

        @keyframes bounce-in {
            0% {
                transform: scale(0.95);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.08);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .retro-btn-pill.highlighted {
            opacity: 1;
            animation: bounce-in 0.5s ease forwards, pulse-glow 2s ease-in-out infinite 0.5s;
        }

        /* Indicateur de progression */
        .progress-hint {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--retro-teal);
            opacity: 0.7;
            text-align: center;
            transition: opacity 0.3s ease;
        }

        .progress-hint.hidden {
            opacity: 0;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .page-frame {
                padding: 40px 20px;
            }

            .title {
                font-size: 1.3rem;
            }

            .corner-flourish {
                width: 35px;
                height: 35px;
            }

            .retro-btn-pill-text {
                padding: 0.7rem 1.2rem;
                font-size: 0.9rem;
            }

            .retro-btn-pill-icon {
                width: 46px;
            }
        }
    </style>
</head>
<body>
    <div class="page-frame">
        <!-- Motifs floraux aux coins -->
        <div class="corner-flourish top-left">
            <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 45 Q5 25 25 25 Q25 5 45 5" stroke="currentColor" stroke-width="2" fill="none"/>
                <circle cx="25" cy="25" r="3" fill="currentColor"/>
                <path d="M15 35 Q15 25 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
                <path d="M35 15 Q25 15 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
            </svg>
        </div>
        <div class="corner-flourish top-right">
            <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 45 Q5 25 25 25 Q25 5 45 5" stroke="currentColor" stroke-width="2" fill="none"/>
                <circle cx="25" cy="25" r="3" fill="currentColor"/>
                <path d="M15 35 Q15 25 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
                <path d="M35 15 Q25 15 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
            </svg>
        </div>
        <div class="corner-flourish bottom-left">
            <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 45 Q5 25 25 25 Q25 5 45 5" stroke="currentColor" stroke-width="2" fill="none"/>
                <circle cx="25" cy="25" r="3" fill="currentColor"/>
                <path d="M15 35 Q15 25 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
                <path d="M35 15 Q25 15 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
            </svg>
        </div>
        <div class="corner-flourish bottom-right">
            <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 45 Q5 25 25 25 Q25 5 45 5" stroke="currentColor" stroke-width="2" fill="none"/>
                <circle cx="25" cy="25" r="3" fill="currentColor"/>
                <path d="M15 35 Q15 25 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
                <path d="M35 15 Q25 15 25 25" stroke="currentColor" stroke-width="1.5" fill="none"/>
            </svg>
        </div>

        <h1 class="title">Ce que vous allez apprendre<br>dans cette formation optimisée</h1>

        <div class="retro-separator">
            <span class="flourish">❧</span>
        </div>

        <div class="video-container">
            <div id="player"></div>
        </div>

        <div class="button-container">
            <a href="https://borzeux.my.canva.site/intro-ia/page-9" class="retro-btn-pill subtle" id="returnBtn">
                <span class="retro-btn-pill-text">Retour à la formation</span>
                <span class="retro-btn-pill-icon">»</span>
            </a>
        </div>

        <p class="progress-hint" id="progressHint">Le bouton sera activé à la fin de la vidéo</p>
    </div>

    <!-- YouTube IFrame API -->
    <script>
        // Charger l'API YouTube
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var videoStarted = false;
        var highlightTimeout;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'FJcagGID6ho',
                playerVars: {
                    'rel': 0,
                    'modestbranding': 1,
                    'playsinline': 1
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            var btn = document.getElementById('returnBtn');
            var hint = document.getElementById('progressHint');

            // Vidéo commence à jouer
            if (event.data == YT.PlayerState.PLAYING && !videoStarted) {
                videoStarted = true;
                hint.textContent = "Regardez la vidéo jusqu'à la fin...";
                
                // Timer de secours basé sur la durée (4:54 = 294 secondes)
                // On déclenche un peu avant pour anticiper
                highlightTimeout = setTimeout(function() {
                    highlightButton();
                }, 290000); // 290 secondes
            }

            // Vidéo terminée
            if (event.data == YT.PlayerState.ENDED) {
                clearTimeout(highlightTimeout);
                highlightButton();
            }
        }

        function highlightButton() {
            var btn = document.getElementById('returnBtn');
            var hint = document.getElementById('progressHint');
            
            btn.classList.remove('subtle');
            btn.classList.add('highlighted');
            hint.classList.add('hidden');
        }

        // Fallback si l'API YouTube ne charge pas
        setTimeout(function() {
            if (!player) {
                // Créer une iframe standard
                document.getElementById('player').innerHTML = 
                    '<iframe src="https://www.youtube.com/embed/FJcagGID6ho?rel=0&modestbranding=1" ' +
                    'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" ' +
                    'allowfullscreen style="width:100%;height:100%;border:none;"></iframe>';
                
                // Activer le bouton après la durée de la vidéo
                setTimeout(highlightButton, 294000);
            }
        }, 3000);
    </script>
</body>
</html>
